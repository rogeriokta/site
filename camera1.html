<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Câmera Pro - Captura de Imagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        #video {
            position: absolute;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            transform: scale(1);
            transition: transform 0.2s ease;
        }

        /* Para zoom 0.5x - garantir que ocupe toda a tela */
        .video-wrapper.zoom-wide #video {
            min-width: 200%;
            min-height: 200%;
            object-fit: cover;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            z-index: 10;
        }

        .top-controls {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-danger {
            background: #f44336;
            border-color: #f44336;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.8);
            margin: 0 auto;
            display: block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 20;
            transition: right 0.3s;
            padding: 20px;
            overflow-y: auto;
        }

        .settings-panel.open {
            right: 0;
        }

        .setting-item {
            margin-bottom: 20px;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        .setting-item input, .setting-item select {
            width: 100%;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 5px;
        }

        .zoom-value {
            margin-top: 5px;
            text-align: center;
            font-size: 12px;
        }

        /* Preview com zoom */
        .preview-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 30;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .preview-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 101;
        }

        .preview-image-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            touch-action: pinch-zoom;
        }

        #previewImage {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.1s ease;
            cursor: zoom-in;
        }

        #previewImage.zoomed {
            cursor: zoom-out;
        }

        .preview-controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 101;
        }

        .zoom-controls-preview {
            position: absolute;
            bottom: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 102;
        }

        .zoom-preview-btn {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .zoom-preview-btn:active {
            transform: scale(0.95);
        }

        .zoom-indicator {
            position: absolute;
            bottom: 180px;
            right: 30px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 102;
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 200;
            display: none;
            pointer-events: none;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .zoom-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .zoom-presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preset-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .preset-btn.active {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            text-align: center;
            color: #f44336;
        }

        @media (max-width: 768px) {
            .settings-panel {
                width: 100%;
            }
            
            .btn {
                padding: 8px 15px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline muted></video>
        </div>
        
        <div class="top-controls">
            <button class="btn" id="settingsBtn">⚙️ Configurações</button>
            <button class="btn" id="switchCameraBtn">🔄 Trocar Câmera</button>
        </div>
        
        <div class="controls">
            <button class="capture-btn" id="captureBtn"></button>
        </div>
        
        <div class="settings-panel" id="settingsPanel">
            <h3>Configurações da Câmera</h3>
            <button class="btn" id="closeSettings" style="margin-bottom: 20px;">✖ Fechar</button>
            
            <div class="setting-item">
                <label>📹 Zoom (0.5x - 5x)</label>
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoomOutBtn">-</button>
                    <input type="range" id="zoomSlider" min="0.5" max="5" step="0.1" value="1">
                    <button class="zoom-btn" id="zoomInBtn">+</button>
                </div>
                <div class="zoom-value" id="zoomValue">1.0x</div>
                <div class="zoom-presets">
                    <button class="preset-btn" data-zoom="0.5">0.5x (Ultra-wide)</button>
                    <button class="preset-btn" data-zoom="1">1x (Normal)</button>
                    <button class="preset-btn" data-zoom="2">2x</button>
                    <button class="preset-btn" data-zoom="3">3x</button>
                    <button class="preset-btn" data-zoom="5">5x</button>
                </div>
            </div>
            
            <div class="setting-item">
                <label>📐 Resolução Suportadas</label>
                <select id="resolutionSelect">
                    <option value="default">Auto (Recomendado)</option>
                </select>
                <div style="font-size: 11px; color: #888; margin-top: 5px;">
                    ⚡ Resoluções detectadas automaticamente
                </div>
            </div>
            
            <div class="setting-item">
                <label>💡 Flash/Torch</label>
                <select id="torchSelect">
                    <option value="off">Desligado</option>
                    <option value="on">Ligado</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>🎨 Qualidade da Imagem</label>
                <input type="range" id="qualitySlider" min="0.5" max="1" step="0.05" value="0.9">
                <div class="zoom-value">Qualidade: <span id="qualityValue">90</span>%</div>
            </div>
            
            <div class="setting-item">
                <label>🔄 Espelhar Imagem</label>
                <select id="mirrorSelect">
                    <option value="none">Normal</option>
                    <option value="horizontal">Espelhado</option>
                </select>
            </div>
        </div>
        
        <!-- Preview com zoom -->
        <div class="preview-overlay" id="previewOverlay">
            <div class="preview-header">
                <button class="btn" id="closePreviewBtn">✖ Fechar</button>
                <h3>Preview da Imagem</h3>
                <div style="width: 70px;"></div>
            </div>
            <div class="preview-image-container" id="previewContainer">
                <img id="previewImage" alt="Preview" draggable="false">
            </div>
            <div class="preview-controls">
                <button class="btn btn-primary" id="confirmBtn">✓ Enviar para API</button>
                <button class="btn btn-danger" id="cancelPreviewBtn">✗ Cancelar</button>
            </div>
            <div class="zoom-controls-preview">
                <button class="zoom-preview-btn" id="previewZoomIn">+</button>
                <button class="zoom-preview-btn" id="previewZoomOut">-</button>
                <button class="zoom-preview-btn" id="previewResetZoom">⟳</button>
            </div>
            <div class="zoom-indicator" id="zoomIndicator">100%</div>
        </div>
        
        <div class="flash" id="flash"></div>
    </div>

    <script>
        class CameraApp {
            constructor() {
                this.video = document.getElementById('video');
                this.videoWrapper = document.getElementById('videoWrapper');
                this.stream = null;
                this.currentFacingMode = 'environment';
                this.currentZoom = 1;
                this.zoomSlider = document.getElementById('zoomSlider');
                this.zoomValue = document.getElementById('zoomValue');
                this.resolutionSelect = document.getElementById('resolutionSelect');
                this.torchSelect = document.getElementById('torchSelect');
                this.qualitySlider = document.getElementById('qualitySlider');
                this.qualityValue = document.getElementById('qualityValue');
                this.mirrorSelect = document.getElementById('mirrorSelect');
                this.currentTrack = null;
                this.supportedResolutions = [];
                this.previewZoom = 1;
                this.previewImage = document.getElementById('previewImage');
                this.previewContainer = document.getElementById('previewContainer');
                
                this.init();
                this.attachEventListeners();
            }
            
            async init() {
                try {
                    await this.startCamera();
                } catch (error) {
                    this.showError('Erro ao acessar câmera: ' + error.message);
                }
            }
            
            async startCamera() {
                try {
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }
                    
                    // Configurações básicas
                    const constraints = {
                        video: {
                            facingMode: { ideal: this.currentFacingMode }
                        }
                    };
                    
                    // Adicionar resolução se especificada
                    const resolution = this.resolutionSelect.value;
                    if (resolution !== 'default' && resolution !== 'auto') {
                        const [width, height] = resolution.split('x');
                        constraints.video.width = { ideal: parseInt(width) };
                        constraints.video.height = { ideal: parseInt(height) };
                    }
                    
                    console.log('Solicitando câmera...');
                    
                    this.stream = await navigator.mediaDevices.getUserMedia(constraints);
                    this.video.srcObject = this.stream;
                    await this.video.play();
                    
                    this.currentTrack = this.stream.getVideoTracks()[0];
                    console.log('Câmera ativada:', this.currentTrack.getSettings());
                    
                    // Detectar resoluções suportadas
                    await this.detectSupportedResolutions();
                    
                    // Aplicar torch se necessário
                    await this.applyTorch();
                    
                    // Aplicar zoom inicial
                    this.updateZoom(this.currentZoom);
                    
                } catch (error) {
                    console.error('Erro ao acessar câmera:', error);
                    throw error;
                }
            }
            
            async detectSupportedResolutions() {
                try {
                    const capabilities = this.currentTrack.getCapabilities();
                    console.log('Capabilities:', capabilities);
                    
                    if (capabilities.width && capabilities.width.max) {
                        // Resoluções comuns para testar
                        const commonResolutions = [
                            { width: 3840, height: 2160, label: '4K (3840x2160)' },
                            { width: 2560, height: 1440, label: '2K (2560x1440)' },
                            { width: 1920, height: 1080, label: 'Full HD (1920x1080)' },
                            { width: 1280, height: 720, label: 'HD (1280x720)' },
                            { width: 640, height: 480, label: 'SD (640x480)' },
                            { width: 352, height: 288, label: 'CIF (352x288)' }
                        ];
                        
                        this.resolutionSelect.innerHTML = '<option value="default">Auto (Recomendado)</option>';
                        
                        for (const res of commonResolutions) {
                            if (capabilities.width.max >= res.width && capabilities.height.max >= res.height) {
                                const option = document.createElement('option');
                                option.value = `${res.width}x${res.height}`;
                                option.textContent = `${res.label} ✓`;
                                this.resolutionSelect.appendChild(option);
                                this.supportedResolutions.push(res);
                            }
                        }
                        
                        if (this.supportedResolutions.length === 0) {
                            // Fallback para resoluções básicas
                            const option = document.createElement('option');
                            option.value = '640x480';
                            option.textContent = '640x480 (Padrão)';
                            this.resolutionSelect.appendChild(option);
                        }
                    }
                } catch (error) {
                    console.error('Erro ao detectar resoluções:', error);
                }
            }
            
            async applyTorch() {
                if (!this.currentTrack) return;
                
                const torchEnabled = this.torchSelect.value === 'on';
                
                try {
                    const capabilities = this.currentTrack.getCapabilities();
                    if (capabilities && capabilities.torch) {
                        await this.currentTrack.applyConstraints({
                            advanced: [{ torch: torchEnabled }]
                        });
                        console.log('Torch:', torchEnabled ? 'ligado' : 'desligado');
                    }
                } catch (error) {
                    console.error('Erro ao aplicar torch:', error);
                }
            }
            
            updateZoom(value) {
                this.currentZoom = parseFloat(value);
                this.zoomSlider.value = this.currentZoom;
                this.zoomValue.textContent = `${this.currentZoom.toFixed(1)}x`;
                
                // Aplicar zoom via CSS
                this.video.style.transform = `scale(${this.currentZoom})`;
                
                // Para zoom 0.5x, ajustar o wrapper para garantir que ocupe toda a tela
                if (this.currentZoom <= 0.6) {
                    this.videoWrapper.classList.add('zoom-wide');
                    this.video.style.minWidth = '200%';
                    this.video.style.minHeight = '200%';
                } else {
                    this.videoWrapper.classList.remove('zoom-wide');
                    this.video.style.minWidth = 'auto';
                    this.video.style.minHeight = 'auto';
                }
                
                // Centralizar
                this.video.style.transformOrigin = 'center center';
                
                // Atualizar presets
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    if (Math.abs(parseFloat(btn.dataset.zoom) - this.currentZoom) < 0.1) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            }
            
            async captureImage() {
                try {
                    const canvas = document.createElement('canvas');
                    let videoWidth = this.video.videoWidth;
                    let videoHeight = this.video.videoHeight;
                    
                    if (videoWidth === 0 || videoHeight === 0) {
                        throw new Error('Vídeo não está pronto');
                    }
                    
                    canvas.width = videoWidth;
                    canvas.height = videoHeight;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // Aplicar zoom digital na captura
                    const zoomLevel = this.currentZoom;
                    let sourceX = 0, sourceY = 0, sourceW = videoWidth, sourceH = videoHeight;
                    
                    if (zoomLevel !== 1) {
                        sourceW = videoWidth / zoomLevel;
                        sourceH = videoHeight / zoomLevel;
                        sourceX = (videoWidth - sourceW) / 2;
                        sourceY = (videoHeight - sourceH) / 2;
                    }
                    
                    // Aplicar espelhamento
                    if (this.mirrorSelect.value === 'horizontal') {
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                    }
                    
                    // Desenhar no canvas
                    ctx.drawImage(this.video, sourceX, sourceY, sourceW, sourceH, 0, 0, canvas.width, canvas.height);
                    
                    // Efeito de flash
                    this.showFlash();
                    
                    const quality = parseFloat(this.qualitySlider.value);
                    const imageData = canvas.toDataURL('image/jpeg', quality);
                    
                    this.showPreview(imageData);
                    
                } catch (error) {
                    console.error('Erro ao capturar imagem:', error);
                    this.showError('Erro ao capturar imagem: ' + error.message);
                }
            }
            
            showFlash() {
                const flash = document.getElementById('flash');
                flash.style.display = 'block';
                setTimeout(() => {
                    flash.style.display = 'none';
                }, 100);
            }
            
            showPreview(imageData) {
                const previewOverlay = document.getElementById('previewOverlay');
                this.previewImage.src = imageData;
                previewOverlay.style.display = 'flex';
                this.currentCapturedImage = imageData;
                this.resetPreviewZoom();
            }
            
            resetPreviewZoom() {
                this.previewZoom = 1;
                this.previewImage.style.transform = `scale(${this.previewZoom})`;
                this.previewImage.style.cursor = 'zoom-in';
                this.previewImage.classList.remove('zoomed');
                document.getElementById('zoomIndicator').textContent = '100%';
            }
            
            zoomPreview(delta) {
                let newZoom = this.previewZoom + delta;
                newZoom = Math.max(1, Math.min(5, newZoom));
                this.previewZoom = newZoom;
                this.previewImage.style.transform = `scale(${this.previewZoom})`;
                document.getElementById('zoomIndicator').textContent = `${Math.round(this.previewZoom * 100)}%`;
                
                if (this.previewZoom > 1) {
                    this.previewImage.style.cursor = 'zoom-out';
                    this.previewImage.classList.add('zoomed');
                } else {
                    this.previewImage.style.cursor = 'zoom-in';
                    this.previewImage.classList.remove('zoomed');
                }
            }
            
            async sendToAPI(imageData) {
                const loadingMsg = this.showLoading('Enviando para API...');
                
                try {
                    const blob = this.dataURLtoBlob(imageData);
                    
                    const formData = new FormData();
                    formData.append('image', blob, 'capture.jpg');
                    formData.append('timestamp', Date.now());
                    formData.append('resolution', `${this.video.videoWidth}x${this.video.videoHeight}`);
                    formData.append('zoom', this.currentZoom.toString());
                    formData.append('quality', this.qualitySlider.value);
                    
                    // Simular envio para API
                    console.log('Dados para enviar:', {
                        tamanho: blob.size,
                        tipo: blob.type,
                        resolucao: `${this.video.videoWidth}x${this.video.videoHeight}`,
                        zoom: this.currentZoom,
                        qualidade: Math.round(this.qualitySlider.value * 100) + '%'
                    });
                    
                    // Simular resposta
                    setTimeout(() => {
                        this.showResult({
                            success: true,
                            message: 'Imagem recebida com sucesso!',
                            data: {
                                size: blob.size,
                                resolution: `${this.video.videoWidth}x${this.video.videoHeight}`,
                                quality: Math.round(this.qualitySlider.value * 100) + '%',
                                zoom: this.currentZoom + 'x'
                            }
                        });
                    }, 1000);
                    
                } catch (error) {
                    console.error('Erro ao enviar para API:', error);
                    this.showError('Erro ao enviar imagem: ' + error.message);
                } finally {
                    this.hideLoading(loadingMsg);
                }
            }
            
            dataURLtoBlob(dataURL) {
                const parts = dataURL.split(';base64,');
                const contentType = parts[0].split(':')[1];
                const raw = window.atob(parts[1]);
                const rawLength = raw.length;
                const uInt8Array = new Uint8Array(rawLength);
                
                for (let i = 0; i < rawLength; ++i) {
                    uInt8Array[i] = raw.charCodeAt(i);
                }
                
                return new Blob([uInt8Array], { type: contentType });
            }
            
            showLoading(message) {
                const div = document.createElement('div');
                div.id = 'loading';
                div.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0,0,0,0.9);
                    padding: 20px;
                    border-radius: 10px;
                    z-index: 1000;
                    color: white;
                    text-align: center;
                `;
                div.innerHTML = `<div>${message}</div><div style="margin-top:10px;">⏳</div>`;
                document.body.appendChild(div);
                return div;
            }
            
            hideLoading(element) {
                if (element) element.remove();
            }
            
            showResult(result) {
                const div = document.createElement('div');
                div.style.cssText = `
                    position: fixed;
                    bottom: 100px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(0,0,0,0.9);
                    padding: 15px 25px;
                    border-radius: 10px;
                    z-index: 1000;
                    color: #4CAF50;
                    text-align: center;
                    animation: fadeOut 3s forwards;
                `;
                div.innerHTML = `✅ ${result.message}<br><small>Resolução: ${result.data.resolution}<br>Qualidade: ${result.data.quality}<br>Zoom: ${result.data.zoom}</small>`;
                document.body.appendChild(div);
                
                setTimeout(() => div.remove(), 3000);
            }
            
            showError(message) {
                const div = document.createElement('div');
                div.className = 'error-message';
                div.innerHTML = `
                    ❌ ${message}<br>
                    <button onclick="this.parentElement.remove()" style="margin-top:10px; padding:5px 10px;">OK</button>
                `;
                document.body.appendChild(div);
                
                setTimeout(() => {
                    if (div.parentElement) div.remove();
                }, 5000);
            }
            
            async switchCamera() {
                this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                await this.startCamera();
                this.updateZoom(1);
            }
            
            attachEventListeners() {
                document.getElementById('captureBtn').addEventListener('click', () => this.captureImage());
                document.getElementById('switchCameraBtn').addEventListener('click', () => this.switchCamera());
                document.getElementById('settingsBtn').addEventListener('click', () => {
                    document.getElementById('settingsPanel').classList.add('open');
                });
                document.getElementById('closeSettings').addEventListener('click', () => {
                    document.getElementById('settingsPanel').classList.remove('open');
                });
                document.getElementById('closePreviewBtn').addEventListener('click', () => {
                    document.getElementById('previewOverlay').style.display = 'none';
                    this.resetPreviewZoom();
                });
                document.getElementById('confirmBtn').addEventListener('click', () => {
                    document.getElementById('previewOverlay').style.display = 'none';
                    this.sendToAPI(this.currentCapturedImage);
                    this.resetPreviewZoom();
                });
                document.getElementById('cancelPreviewBtn').addEventListener('click', () => {
                    document.getElementById('previewOverlay').style.display = 'none';
                    this.resetPreviewZoom();
                });
                
                // Controles de zoom do preview
                document.getElementById('previewZoomIn').addEventListener('click', () => this.zoomPreview(0.5));
                document.getElementById('previewZoomOut').addEventListener('click', () => this.zoomPreview(-0.5));
                document.getElementById('previewResetZoom').addEventListener('click', () => this.resetPreviewZoom());
                
                // Zoom com toque no preview
                this.previewImage.addEventListener('click', (e) => {
                    if (this.previewZoom > 1) {
                        this.resetPreviewZoom();
                    } else {
                        this.zoomPreview(0.5);
                    }
                });
                
                // Zoom slider
                this.zoomSlider.addEventListener('input', (e) => {
                    this.updateZoom(e.target.value);
                });
                
                // Botões de zoom
                document.getElementById('zoomInBtn').addEventListener('click', () => {
                    let newZoom = Math.min(this.currentZoom + 0.5, parseFloat(this.zoomSlider.max));
                    this.updateZoom(newZoom);
                });
                
                document.getElementById('zoomOutBtn').addEventListener('click', () => {
                    let newZoom = Math.max(this.currentZoom - 0.5, parseFloat(this.zoomSlider.min));
                    this.updateZoom(newZoom);
                });
                
                // Presets de zoom
                document.querySelectorAll('.preset-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const zoomValue = parseFloat(e.target.dataset.zoom);
                        this.updateZoom(zoomValue);
                    });
                });
                
                // Qualidade
                this.qualitySlider.addEventListener('input', (e) => {
                    const quality = Math.round(e.target.value * 100);
                    this.qualityValue.textContent = quality;
                });
                
                // Torch
                this.torchSelect.addEventListener('change', () => this.applyTorch());
                
                // Resolução
                this.resolutionSelect.addEventListener('change', () => this.startCamera());
            }
        }
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                new CameraApp();
            } else {
                alert('Seu navegador não suporta acesso à câmera');
            }
        });
        
        // Animação fadeOut
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translateX(-50%) translateY(0); }
                70% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
